name: CI

# Self-contained CI for a NextStageSY ABP web app.
#
# The build/test + docker compose build steps are inlined here (rather than
# calling a shared reusable workflow), so this repo has no cross-repo dependency
# and works whether it is public or private. All five -Web repos carry an
# identical copy of this file; if you change one, mirror it to the others.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, test & docker compose build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve project name
        id: proj
        run: |
          slnx=$(ls *.slnx 2>/dev/null | head -n1)
          if [ -z "$slnx" ]; then
            echo "::error::No .slnx solution file found at the repo root."
            exit 1
          fi
          name="${slnx%.slnx}"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "Resolved project name: $name"

      # ABP references appsettings.secrets.json as a copy-to-output content file,
      # but it is gitignored. Seed empty placeholders so a clean checkout builds.
      - name: Seed empty appsettings.secrets.json
        run: |
          grep -rl --include='*.csproj' 'appsettings.secrets.json' . | while read -r csproj; do
            f="$(dirname "$csproj")/appsettings.secrets.json"
            if [ ! -f "$f" ]; then
              echo '{}' > "$f"
              echo "created $f"
            fi
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore "${{ steps.proj.outputs.name }}.slnx"

      - name: Build
        run: dotnet build "${{ steps.proj.outputs.name }}.slnx" -c Release --no-restore --nologo

      - name: Test
        run: dotnet test "${{ steps.proj.outputs.name }}.slnx" -c Release --no-build --nologo

      - name: Publish HttpApi.Host
        run: dotnet publish "src/${{ steps.proj.outputs.name }}.HttpApi.Host/${{ steps.proj.outputs.name }}.HttpApi.Host.csproj" -c Release --no-build --nologo

      - name: Publish DbMigrator
        run: dotnet publish "src/${{ steps.proj.outputs.name }}.DbMigrator/${{ steps.proj.outputs.name }}.DbMigrator.csproj" -c Release --no-build --nologo

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The angular image builds itself (yarn build:prod inside the image), so
      # this also validates the Angular production build.
      - name: Build images (docker compose)
        run: docker compose -f "etc/docker-compose/docker-compose.ci.yml" build
