name: 🐛 Bug report
description: Report a defect or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please fill out the sections below so we can reproduce and fix it quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - "API / Backend (.NET)"
        - "Angular UI"
        - "Database / Migrations"
        - "Authentication / Identity"
        - "Docs"
        - "CI / CD"
        - "Mobile"
        - "Other / Not sure"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: App version, image tag, or git commit SHA.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Browser:
        - Deployment (local / docker / staging):
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. This is automatically formatted, no backticks needed.
      render: shell
    validations:
      required: false
