name: 🛠️ Task / chore
description: An internal engineering task or chore
title: "[Task]: "
labels: ["task"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "API / Backend (.NET)"
        - "Angular UI"
        - "Database / Migrations"
        - "Authentication / Identity"
        - "Docs"
        - "CI / CD"
        - "Mobile"
        - "Other / Not sure"
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this is done?
      value: |
        - [ ]
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes / links
    validations:
      required: false
